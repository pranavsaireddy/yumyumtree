name: CI

# Triggers: every push (any branch) and every pull request targeting main.
on:
  push:
  pull_request:
    branches: [main]

# Cancel an in-progress run for the same ref when a newer commit arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # apps/api — install + Vitest suite.
  #
  # DB-SECRET HANDLING (the important part):
  #   The integration test (health.test.js → GET /readyz) does a live round-trip to
  #   the DEV Supabase DB and therefore needs real credentials. Those are GitHub
  #   repository secrets and MUST NOT appear as values in this file.
  #
  #   CI_HAS_DEV_DB is the single switch the suite reads:
  #     - secrets present  → ${{ secrets.SUPABASE_URL != '' }} evaluates to 'true'
  #                          → real creds are injected, the DB test RUNS.
  #     - secrets absent   → evaluates to 'false'
  #                          → NON-SECRET placeholders are injected (so config.js's
  #                            fail-fast validation passes and the pure /health test
  #                            still runs), and the suite SKIPS only the DB test.
  #   See health.test.js for the exact skip predicate and its three-case rationale.
  # ────────────────────────────────────────────────────────────────────────────
  api:
    name: api (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          # 'true' only when this run can see the DEV Supabase secrets; 'false' otherwise
          # (e.g. pull requests from forks, or a repo without secrets configured).
          CI_HAS_DEV_DB: ${{ secrets.SUPABASE_URL != '' }}
          # config.js fails fast when any required var is blank. Real secrets when available;
          # otherwise harmless non-secret placeholders — enough to construct the app, not to
          # reach a database. The DB test is skipped in that case, so the placeholders are
          # never exercised against a real service.
          PORT: ${{ secrets.PORT || '4000' }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL || 'http://localhost:3000' }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'placeholder-service-role-key' }}
          # DATABASE_URL is required by config.js (S10, pg-boss). The placeholder is a valid
          # DIRECT (:5432) connection string — never the :6543 pooler, which config.js refuses.
          # pg-boss only ever connects at boss.start() (server.js), which the test suite never
          # calls, so the placeholder is constructed but never dialled.
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder:placeholder@localhost:5432/postgres' }}
          # APP_ENV is forced to 'test' by vitest.config.js (test.env), so it is not set here.

  # ────────────────────────────────────────────────────────────────────────────
  # apps/web — lint + build. Un-parked in S5 (frontend menu + cart). Needs no
  # secrets — only the non-secret, build-time NEXT_PUBLIC_* placeholders below.
  # ────────────────────────────────────────────────────────────────────────────
  web:
    name: web (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
        env:
          # Build-time publics only — NEVER real secrets.
          NEXT_PUBLIC_BACKEND_URL: http://localhost:4000
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder

  # ────────────────────────────────────────────────────────────────────────────
  # E2E — Playwright critical-path (S11A). Boots the api (:4000) AND web (:3000)
  # dev servers against the real DEV Supabase, then runs the chromium specs:
  #   1. menu → cart → checkout → simulated Razorpay webhook → /track reaches Placed
  #   2. logged-out /checkout shows the client-side sign-in gate
  #
  # SECRETS: this job needs the real DEV creds (the api server talks to the DB and
  # starts pg-boss for real; the simulator signs with RAZORPAY_WEBHOOK_SECRET; the
  # auth helper signs the test user in with the anon key). Job-level env injects them
  # from repository secrets — no secret values appear in this file. NEXT_PUBLIC_*
  # values reuse the same URL/anon-key (the anon key is a public client key).
  # ────────────────────────────────────────────────────────────────────────────
  e2e:
    name: e2e (playwright)
    runs-on: ubuntu-latest
    env:
      APP_ENV: development
      PORT: '4000'
      FRONTEND_URL: http://localhost:3000
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      RAZORPAY_WEBHOOK_SECRET: ${{ secrets.RAZORPAY_WEBHOOK_SECRET }}
      NEXT_PUBLIC_BACKEND_URL: http://localhost:4000
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            apps/api/package-lock.json
            apps/web/package-lock.json

      - name: Install api dependencies
        working-directory: apps/api
        run: npm ci
      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci
      - name: Install Playwright chromium
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Boot servers + run E2E
        working-directory: apps/web
        run: |
          node ../api/src/server.js > /tmp/api.log 2>&1 &
          npm run dev > /tmp/web.log 2>&1 &
          npx wait-on -t 120000 http-get://localhost:4000/health http-get://localhost:3000
          npm run e2e

      - name: Dump server logs on failure
        if: failure()
        run: tail -n 200 /tmp/api.log /tmp/web.log || true

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report/
            apps/web/test-results/
          retention-days: 7
